<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fabric Notebook Closed-Loop Development Process</title>
<style>
  /* Karpathy wiki style — clean, readable, single-column */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 17px; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    color: #1a1a1a;
    background: #fafafa;
    line-height: 1.7;
    padding: 2rem 1rem;
    max-width: 52rem;
    margin: 0 auto;
  }
  h1 { font-size: 2rem; margin: 1.5rem 0 0.5rem; border-bottom: 2px solid #333; padding-bottom: 0.3rem; }
  h2 { font-size: 1.5rem; margin: 2rem 0 0.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.2rem; }
  h3 { font-size: 1.2rem; margin: 1.5rem 0 0.4rem; }
  h4 { font-size: 1rem; margin: 1.2rem 0 0.3rem; }
  p, ul, ol { margin: 0.6rem 0; }
  ul, ol { padding-left: 1.5rem; }
  li { margin: 0.2rem 0; }
  a { color: #1a5f7a; text-decoration: none; border-bottom: 1px solid #b0d4e3; }
  a:hover { color: #0d3d52; border-bottom-color: #0d3d52; }
  code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.88rem;
    background: #f0f0f0;
    padding: 0.15rem 0.35rem;
    border-radius: 3px;
  }
  pre {
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1rem;
    overflow-x: auto;
    margin: 0.8rem 0;
    line-height: 1.5;
  }
  pre code { background: none; padding: 0; font-size: 0.85rem; }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.8rem 0;
    font-size: 0.92rem;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 0.45rem 0.7rem;
    text-align: left;
  }
  th { background: #f0f0f0; font-weight: 600; }
  tr:nth-child(even) { background: #fafafa; }
  blockquote {
    border-left: 3px solid #E3120B;
    padding: 0.5rem 1rem;
    margin: 0.8rem 0;
    background: #fff8f8;
    color: #333;
  }
  hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
  .mermaid {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 1rem;
    margin: 1rem 0;
    text-align: center;
  }
  /* TOC styling */
  nav { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; padding: 1rem 1.5rem; margin: 1rem 0; }
  nav ol { padding-left: 1.2rem; }
  nav li { margin: 0.15rem 0; }
  /* Print */
  @media print {
    body { max-width: none; font-size: 11pt; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
    a { color: #000; border-bottom: none; }
  }
  @media (max-width: 600px) {
    html { font-size: 15px; }
    body { padding: 1rem 0.5rem; }
  }
</style>
</head>
<body>
<!--CONTENT-->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    fontFamily: 'Georgia, serif',
    themeVariables: {
      primaryColor: '#B0BEC5',
      primaryTextColor: '#121212',
      primaryBorderColor: '#455A64',
      lineColor: '#455A64',
      secondaryColor: '#ECEFF1',
      secondaryBorderColor: '#455A64',
      tertiaryColor: '#FFFFFF',
      tertiaryBorderColor: '#455A64',
    }
  });
</script>
</body>
</html>
